<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人介绍</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: rgba(255, 255, 255, 0.78);
      --text: #1f2a44;
      --subtext: #5f6b86;
      --accent: #4f7cff;
      --accent-hover: #3e67e0;
      --border: rgba(255, 255, 255, 0.85);
      --shadow: 0 16px 40px rgba(31, 42, 68, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #dfe7ff 0, transparent 32%),
        radial-gradient(circle at 85% 8%, #d7fff2 0, transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #edf2ff 100%);
      min-height: 100vh;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.72);
      border-bottom: 1px solid rgba(79, 124, 255, 0.12);
    }

    .nav-inner {
      width: min(960px, 92vw);
      margin: 0 auto;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 0.6rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      padding: 0.5rem 0.85rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(79, 124, 255, 0.14);
      color: var(--accent);
    }

    main {
      width: min(960px, 92vw);
      margin: 2rem auto 2.5rem;
    }

    .profile-card,
    .board-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .profile-card {
      padding: 2rem 1.8rem;
      text-align: center;
    }

    .avatar {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 20px rgba(79, 124, 255, 0.25);
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0.2rem 0;
      font-size: 1.95rem;
      color: var(--accent);
    }

    h2 {
      margin: 0.25rem 0 0.8rem;
      font-size: 1.25rem;
      font-weight: 600;
    }

    p {
      margin: 0.7rem auto 0;
      color: var(--subtext);
      line-height: 1.7;
      max-width: 38ch;
    }

    .board-card {
      margin-top: 1.2rem;
      padding: 1.4rem 1.2rem;
    }

    .board-title {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text);
    }

    .board-text {
      margin-top: 0.55rem;
      color: var(--subtext);
      font-size: 0.96rem;
    }

    .board-action {
      margin-top: 0.9rem;
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 0.5rem 0.9rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .board-action:hover {
      background: var(--accent-hover);
    }

    @media (max-width: 640px) {
      .nav-inner {
        height: 56px;
      }

      .logo {
        font-size: 0.92rem;
      }

      .nav-links a {
        padding: 0.4rem 0.7rem;
        font-size: 0.88rem;
      }

      main {
        margin-top: 1.2rem;
      }

      .profile-card {
        padding: 1.4rem 1rem 1.6rem;
      }

      h1 {
        font-size: 1.55rem;
      }

      h2 {
        font-size: 1.08rem;
      }

      p {
        font-size: 0.95rem;
      }

      .avatar {
        width: 92px;
        height: 92px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <p class="logo">我的主页</p>
      <nav class="nav-links">
        <a href="#home">首页</a>
        <a href="#board">留言板</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="home" class="profile-card">
      <img src="/my-first-website/mm.jpg" alt="头像" class="avatar">
      <h1>个人介绍</h1>
      <h2>小帅</h2>
      <p>用一句话介绍自己</p>
      <p><strong>我的爱好：</strong>我渴的时候喝很多水</p>
    </section>

    <section id="board" class="board-card">
      <h3 class="board-title">留言板</h3>
      <p class="board-text">欢迎来到留言板，期待你的留言~</p>
      <a class="board-action" href="#home">返回首页</a>
    </section>
  </main>
</body>
</html>
